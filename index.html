<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوت قناص الفواكه V18 - كاشف الأفخاخ</title>
    <style>
        :root { --neon: #a855f7; --bg: #020617; --card: #1e1b4b; --gold: #fbbf24; --danger: #ef4444; --success: #4ade80; }
        body { font-family: sans-serif; background-color: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .scorecard { background: var(--card); border: 2px solid var(--neon); border-radius: 15px; padding: 12px; width: 95%; max-width: 440px; box-shadow: 0 0 20px rgba(168,85,247,0.2); }
        
        /* تنبيه الفخ */
        .trap-warning { background: rgba(239, 68, 68, 0.2); border: 1px solid var(--danger); color: #fca5a5; padding: 5px; border-radius: 5px; font-size: 10px; margin-top: 4px; display: none; }
        
        #startupOverlay { background: rgba(0,0,0,0.8); border-radius: 10px; padding: 15px; text-align: center; margin-bottom: 10px; border: 1px solid var(--gold); }
        .quad-predictions { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin: 10px 0; }
        .pred-item { text-align: center; padding: 10px; border-radius: 10px; background: rgba(0,0,0,0.4); border: 1px solid #4338ca; position: relative; }
        .is-trap { border-color: var(--danger) !important; opacity: 0.8; }
        
        .name { font-size: 16px; font-weight: bold; color: #f472b6; }
        .bet-zone { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 10px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 95%; max-width: 440px; margin-top: 12px; }
        button { color: white; border: none; padding: 12px 5px; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .btn-fruit { background: #312e81; border-bottom: 3px solid #1e1b4b; }
        .btn-jack { background: linear-gradient(to bottom, #b45309, #78350f); border: 2px solid var(--gold); grid-column: span 3; }
        
        .history-bar { background: #020617; border-radius: 8px; padding: 8px; margin: 10px 0; display: flex; gap: 6px; overflow-x: auto; }
        .h-item { font-size: 10px; padding: 3px 10px; background: #312e81; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="scorecard">
        <div id="startupOverlay">
            <span style="color:var(--gold)">جمع بيانات الخوارزمية...</span>
            <div style="font-size: 20px; font-weight: bold;" id="startupCount">0 / 10</div>
        </div>

        <div id="mainAnalysis" style="display:none">
            <div style="display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 8px;">
                <span>الرصيد: <b id="bal" style="color:var(--success)">0</b></span>
                <span>الربح: <b id="prof">0</b></span>
            </div>

            <div id="smartTip" style="font-size: 11px; color: #e9d5ff; text-align: center; padding: 5px; background: rgba(255,255,255,0.05); border-radius: 5px;"></div>
            
            <div class="quad-predictions" id="quadBox"></div>

            <div class="bet-zone">
                <div style="font-size: 13px;">الرهان الموصى به: <b id="bt" style="color:var(--gold)">10,000</b></div>
                <button onclick="triggerLoss()" style="background:var(--danger); padding:5px 10px; font-size:10px; border-radius:5px;">خسارة / مضاعفة</button>
            </div>
        </div>

        <div class="history-bar" id="hBar"></div>
    </div>

    <div class="grid" id="btns"></div>
    
    <div style="margin-top:15px; display: flex; gap: 10px;">
        <button onclick="reset()" style="background: #475569; padding: 10px 20px; border-radius: 8px; font-size: 12px;">تصفير الجلسة</button>
    </div>

    <script>
        const fruits = [
            {n: "كرز", x: 40}, {n: "بطيخ", x: 20}, {n: "موز", x: 10}, 
            {n: "فراولة", x: 10}, {n: "ليمون", x: 5}, {n: "توت", x: 5}, 
            {n: "كيوي", x: 5}, {n: "عنب", x: 5}
        ];

        let hist = JSON.parse(localStorage.getItem('h18')) || [];
        let bal = parseFloat(localStorage.getItem('b18')) || 1000000;
        let startB = parseFloat(localStorage.getItem('s18')) || bal;
        let multiply = 1;
        let lossCount = 0;

        function update() {
            document.getElementById('startupCount').innerText = hist.length + " / 10";
            document.getElementById('hBar').innerHTML = hist.slice().reverse().map(i => `<span class="h-item">${i}</span>`).join('');
            
            if (hist.length >= 10) {
                document.getElementById('startupOverlay').style.display = "none";
                document.getElementById('mainAnalysis').style.display = "block";
                calculateV18();
            }
            
            document.getElementById('bal').innerText = Math.floor(bal).toLocaleString();
            let profit = bal - startB;
            document.getElementById('prof').innerText = (profit>=0?"+":"") + Math.floor(profit).toLocaleString();
            document.getElementById('prof').style.color = profit>=0? "var(--success)" : "var(--danger)";
            
            let baseBet = 10000;
            document.getElementById('bt').innerText = (baseBet * multiply).toLocaleString();
            save();
        }

        function calculateV18() {
            let lastTwo = hist.slice(-2);
            let isTrapActive = (lastTwo.length === 2 && lastTwo[0] === lastTwo[1]);
            let trapFruit = isTrapActive ? lastTwo[0] : null;

            let scores = fruits.map(f => {
                let last = hist.lastIndexOf(f.n);
                let gap = last === -1 ? 30 : hist.length - 1 - last;
                let score = gap * 5;

                // إذا كانت الفاكهة هي "الفخ" (تكررت مرتين)، خفض تقييمها فوراً
                if (f.n === trapFruit) score -= 100;

                // الكرز والبطيخ لا يظهران إلا في الفجوات الكبيرة
                if (f.x >= 20 && gap < 15) score -= 40;

                return { n: f.n, s: score, x: f.x, trap: f.n === trapFruit };
            }).sort((a,b) => b.s - a.s);

            let tip = document.getElementById('smartTip');
            if (isTrapActive) {
                tip.innerHTML = `⚠️ <b style="color:var(--danger)">تنبيه فخ:</b> تكرار ${trapFruit}. تجنب المراهنة عليه الآن!`;
            } else {
                tip.innerText = "💡 الخوارزمية مستقرة. اتبع التوقعات الأربعة.";
            }

            document.getElementById('quadBox').innerHTML = scores.slice(0, 4).map(s => `
                <div class="pred-item ${s.trap ? 'is-trap' : ''}">
                    <span style="font-size:10px; color:#818cf8">${s.x}x</span>
                    <div class="name">${s.n}</div>
                    ${s.trap ? '<div class="trap-warning" style="display:block">⚠️ فخ تكرار</div>' : ''}
                </div>
            `).join('');
        }

        function triggerLoss() {
            lossCount++;
            multiply *= 2;
            if (lossCount > 4) { multiply = 1; lossCount = 0; }
            update();
        }

        const grid = document.getElementById('btns');
        fruits.forEach(f => {
            let b = document.createElement('button');
            b.innerText = f.n; b.className = "btn-fruit";
            b.onclick = () => {
                hist.push(f.n); if(hist.length > 50) hist.shift();
                multiply = 1; lossCount = 0; update();
            };
            grid.appendChild(b);
        });
        
        let jBtn = document.createElement('button');
        jBtn.innerText = "🎰 جـاكـبـوت (JACKPOT)";
        jBtn.className = "btn-jack";
        jBtn.onclick = () => { hist.push("جاكبوت"); multiply = 1; lossCount = 0; update(); };
        grid.appendChild(jBtn);

        function reset() { if(confirm("تصفير الجلسة؟")) { localStorage.clear(); location.reload(); } }
        function save() {
            localStorage.setItem('h18', JSON.stringify(hist));
            localStorage.setItem('b18', bal);
            localStorage.setItem('s18', startB);
        }
        update();
    </script>
</body>
</html>
