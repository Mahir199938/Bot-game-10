<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوت صائد الصناديق V25 - Crazy Box</title>
    <style>
        :root { --gold: #fbbf24; --bg: #0f172a; --card: #1e293b; --neon: #38bdf8; }
        body { font-family: sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        
        .main-card { background: var(--card); border: 2px solid var(--neon); border-radius: 15px; padding: 15px; width: 95%; max-width: 440px; box-shadow: 0 0 20px rgba(56,189,248,0.2); }
        .header { text-align: center; border-bottom: 1px solid #334155; padding-bottom: 10px; margin-bottom: 15px; }
        
        .prediction-area { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .pred-box { background: rgba(0,0,0,0.3); border: 1px solid #334155; border-radius: 10px; padding: 12px; text-align: center; transition: 0.3s; }
        .pred-box.hot { border-color: var(--gold); background: rgba(251,191,36,0.1); }
        
        .box-num { font-size: 20px; font-weight: bold; color: var(--gold); }
        .box-info { font-size: 11px; color: #94a3b8; }

        .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 95%; max-width: 440px; margin-top: 20px; }
        button { padding: 15px 5px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; background: #334155; color: white; font-size: 14px; }
        button:active { transform: scale(0.95); }
        .btn-active { background: var(--neon); color: var(--bg); }

        .history { display: flex; gap: 5px; overflow-x: auto; padding: 10px; width: 95%; max-width: 440px; margin-top: 15px; background: #000; border-radius: 8px; min-height: 40px; }
        .h-item { min-width: 30px; height: 30px; background: #334155; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .h-last { background: var(--gold); color: black; font-weight: bold; }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="header">
            <h3 style="margin:0; color:var(--neon)">رادار Crazy Box V25</h3>
            <span id="status" style="font-size:11px; color:var(--gold)">أدخل 5 نتائج لتحليل النمط...</span>
        </div>

        <div class="prediction-area" id="predictionArea">
            </div>

        <div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:8px; font-size:12px; text-align:center;">
            الرهان الموصى به: <b style="color:var(--gold)">10,000 لكل صندوق</b>
        </div>
    </div>

    <div class="history" id="historyBar"></div>

    <div class="btn-grid">
        <button onclick="addResult(1)">1</button>
        <button onclick="addResult(2)">2</button>
        <button onclick="addResult(3)">3</button>
        <button onclick="addResult(4)">4</button>
        <button onclick="addResult(5)">5</button>
        <button onclick="addResult(6)">6</button>
        <button onclick="addResult(7)">7</button>
        <button onclick="addResult(8)">8</button>
    </div>

    <script>
        const boxData = [
            {id:1, mul:5}, {id:2, mul:5}, {id:3, mul:5}, {id:4, mul:8},
            {id:5, mul:10}, {id:6, mul:12}, {id:7, mul:15}, {id:8, mul:25}
        ];
        
        let history = JSON.parse(localStorage.getItem('cb_hist')) || [];

        function addResult(n) {
            history.push(n);
            if(history.length > 50) history.shift();
            localStorage.setItem('cb_hist', JSON.stringify(history));
            updateUI();
        }

        function updateUI() {
            const hBar = document.getElementById('historyBar');
            hBar.innerHTML = history.slice().reverse().map((n, i) => 
                `<div class="h-item ${i===0?'h-last':''}">${n}</div>`
            ).join('');

            const status = document.getElementById('status');
            if(history.length < 5) {
                status.innerText = `مطلوب بيانات إضافية: ${history.length} / 5`;
                return;
            }
            status.innerText = "✅ النمط مكتشف - توقعات دقيقة";
            calculate();
        }

        function calculate() {
            const area = document.getElementById('predictionArea');
            let last = history[history.length - 1];

            let scores = boxData.map(box => {
                let lastSeen = history.lastIndexOf(box.id);
                let gap = lastSeen === -1 ? 20 : (history.length - 1 - lastSeen);
                
                // الخوارزمية المعتمدة على صورك:
                let s = gap * 12; // كل ما زاد الغياب زاد الاحتمال
                
                // منع التكرار المباشر (نادر جداً في Crazy Box)
                if(box.id === last) s -= 200;
                
                // نمط "الدرج": إذا طلع 1، فالاحتمال القادم لـ 2 و 3 أعلى
                if(Math.abs(box.id - last) <= 2 && box.id !== last) s += 50;

                return { ...box, score: s, gap: gap };
            }).sort((a,b) => b.score - a.score);

            let top4 = scores.slice(0, 4);

            area.innerHTML = top4.map((p, i) => `
                <div class="pred-box ${i<2?'hot':''}">
                    <div class="box-num">صندوق ${p.id}</div>
                    <div class="box-info">${p.mul}x | غائب ${p.gap}</div>
                    <div style="font-size:9px; color:var(--neon)">${i<2?'أولوية':'تأمين'}</div>
                </div>
            `).join('');
        }

        updateUI();
    </script>
</body>
</html>
