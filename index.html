<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوت قناص الفواكه V20 - إصلاح الأزرار</title>
    <style>
        :root { --neon: #a855f7; --bg: #020617; --card: #1e1b4b; --gold: #fbbf24; --danger: #ef4444; --success: #4ade80; }
        body { font-family: sans-serif; background-color: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        
        .scorecard { background: var(--card); border: 2px solid var(--neon); border-radius: 15px; padding: 12px; width: 95%; max-width: 440px; min-height: 200px; display: flex; flex-direction: column; justify-content: center; }
        
        /* تنبيه جمع البيانات - أصبح لا يغطي الشاشة */
        .data-notice { background: rgba(251, 191, 36, 0.1); border: 1px dashed var(--gold); border-radius: 10px; padding: 15px; text-align: center; color: var(--gold); }
        .data-count { font-size: 24px; font-weight: bold; display: block; margin-top: 5px; }

        .quad-predictions { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin: 10px 0; }
        .pred-item { text-align: center; padding: 10px; border-radius: 10px; background: rgba(0,0,0,0.4); border: 1px solid #4338ca; }
        .name { font-size: 16px; font-weight: bold; color: #f472b6; }

        .bet-zone { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 10px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #334155; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 95%; max-width: 440px; margin-top: 20px; }
        button { color: white; border: none; padding: 15px 5px; border-radius: 10px; font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-fruit { background: #312e81; border-bottom: 4px solid #1e1b4b; }
        .btn-fruit:active { transform: translateY(2px); border-bottom: 0; }
        .btn-jack { background: linear-gradient(to bottom, #b45309, #78350f); border: 2px solid var(--gold); grid-column: span 3; font-size: 18px; margin-top: 10px; }
        
        .history-bar { background: #020617; border-radius: 8px; padding: 8px; margin: 10px 0; display: flex; gap: 6px; overflow-x: auto; min-height: 30px; border: 1px solid #1e293b; }
        .h-item { font-size: 10px; padding: 4px 10px; background: #4338ca; border-radius: 5px; white-space: nowrap; }
    </style>
</head>
<body>

    <div class="scorecard" id="displayArea">
        </div>

    <div class="history-bar" id="hBar"></div>

    <div class="grid" id="btnsArea"></div>
    
    <div style="margin-top:20px;">
        <button onclick="resetAll()" style="background: #475569; padding: 8px 20px; border-radius: 8px; font-size: 11px;">إعادة تعيين كاملة</button>
    </div>

    <script>
        const fruits = [
            {n: "كرز", x: 40}, {n: "بطيخ", x: 20}, {n: "موز", x: 10}, 
            {n: "فراولة", x: 10}, {n: "ليمون", x: 5}, {n: "توت", x: 5}, 
            {n: "كيوي", x: 5}, {n: "عنب", x: 5}
        ];

        let hist = JSON.parse(localStorage.getItem('h20')) || [];
        let failStrike = 0;

        function updateUI() {
            const display = document.getElementById('displayArea');
            const hBar = document.getElementById('hBar');
            
            // تحديث شريط التاريخ
            hBar.innerHTML = hist.slice().reverse().map(i => `<span class="h-item">${i}</span>`).join('');

            if (hist.length < 10) {
                // شاشة جمع البيانات
                display.innerHTML = `
                    <div class="data-notice">
                        <span>الرجاء إدخال آخر 10 نتائج من اللعبة لبدء التحليل الذكي</span>
                        <span class="data-count">${hist.length} / 10</span>
                        <p style="font-size:10px; margin-top:10px;">(اضغط على أزرار الفواكه بالأسفل)</p>
                    </div>
                `;
            } else {
                // شاشة التحليل المتقدم
                renderAnalysis(display);
            }
            localStorage.setItem('h20', JSON.stringify(hist));
        }

        function renderAnalysis(container) {
            let lastFruit = hist[hist.length - 1];
            
            let scores = fruits.map(f => {
                let lastIdx = hist.lastIndexOf(f.n);
                let gap = lastIdx === -1 ? 25 : hist.length - 1 - lastIdx;
                let s = gap * 10;

                if (failStrike >= 3) s -= 150; // كسر التعليق
                if (f.x >= 20 && (gap < 12 || gap > 35)) s = -500; // حماية الكرز
                if (f.n === lastFruit) s = -1000; // منع التكرار الفوري

                return { n: f.n, s: s, x: f.x };
            }).sort((a,b) => b.s - a.s);

            let top4 = scores.slice(0, 4);

            container.innerHTML = `
                <div style="text-align:center; color:var(--success); font-size:12px; margin-bottom:10px;">✅ تم تحليل النمط - التوقعات جاهزة</div>
                <div class="quad-predictions">
                    ${top4.map(s => `
                        <div class="pred-item">
                            <span style="font-size:10px; color:#818cf8">${s.x}x</span>
                            <div class="name">${s.n}</div>
                        </div>
                    `).join('')}
                </div>
                <div class="bet-zone">
                    <span style="font-size:13px;">الرهان الموصى به: <b style="color:var(--gold)">${failStrike >= 3 ? '10,000 (أمان)' : 'حسب رصيدك'}</b></span>
                    <button onclick="failStrike++; updateUI();" style="background:var(--danger); padding:5px 10px; font-size:10px; border-radius:5px;">خطأ</button>
                </div>
            `;
        }

        // إنشاء الأزرار
        const btnsArea = document.getElementById('btnsArea');
        fruits.forEach(f => {
            let b = document.createElement('button');
            b.innerText = f.n;
            b.className = "btn-fruit";
            b.onclick = () => {
                hist.push(f.n);
                if(hist.length > 50) hist.shift();
                
                // فحص الفوز لصفر الفشل
                let currentNames = Array.from(document.querySelectorAll('.name')).map(el => el.innerText);
                if (currentNames.includes(f.n)) {
                    failStrike = 0;
                }
                updateUI();
            };
            btnsArea.appendChild(b);
        });

        // زر الجاكبوت
        let jBtn = document.createElement('button');
        jBtn.innerText = "🎰 جـاكـبـوت (JACKPOT)";
        jBtn.className = "btn-jack";
        jBtn.onclick = () => { hist.push("جاكبوت"); failStrike = 0; updateUI(); };
        btnsArea.appendChild(jBtn);

        function resetAll() { if(confirm("تصفير كل البيانات؟")) { localStorage.clear(); hist=[]; failStrike=0; updateUI(); } }

        updateUI();
    </script>
</body>
</html>
