<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوت المحرك الرباعي V8</title>
    <style>
        :root { --neon: #38bdf8; --bg: #020617; --card: #1e293b; }
        body { font-family: sans-serif; background-color: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        
        .scorecard { background: var(--card); border: 2px solid var(--neon); border-radius: 12px; padding: 12px; width: 95%; max-width: 440px; box-shadow: 0 0 20px rgba(56,189,248,0.2); }
        
        /* نظام الأهداف */
        .goal-box { background: rgba(16, 185, 129, 0.1); border: 1px dashed #10b981; border-radius: 8px; padding: 6px; margin-bottom: 10px; display: flex; justify-content: space-between; font-size: 11px; }
        .goal-achieved { background: rgba(251, 191, 36, 0.3) !important; border: 2px solid #fbbf24 !important; animation: glow 1s infinite alternate; }
        @keyframes glow { from { box-shadow: 0 0 5px #fbbf24; } to { box-shadow: 0 0 15px #fbbf24; } }

        /* منطقة أقوى 4 توقعات */
        .quad-predictions { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin: 10px 0; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px; }
        .pred-item { text-align: center; padding: 5px; border-radius: 6px; border: 1px solid #334155; }
        .rank { font-size: 10px; color: var(--neon); display: block; }
        .name { font-size: 18px; font-weight: bold; color: #fbbf24; }
        .percent { font-size: 10px; color: #94a3b8; }

        .history-bar { background: #0f172a; border-radius: 6px; padding: 8px; margin: 10px 0; display: flex; gap: 5px; overflow-x: auto; border: 1px solid #334155; min-height: 25px; }
        .h-item { font-size: 10px; padding: 2px 6px; background: #334155; border-radius: 4px; white-space: nowrap; border-left: 2px solid var(--neon); }

        .heat-map { display: flex; height: 6px; border-radius: 3px; overflow: hidden; margin: 10px 0 5px 0; }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; width: 95%; max-width: 440px; margin-top: 10px; }
        button { color: white; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-m { background: #991b1b; border-bottom: 3px solid #7f1d1d; }
        .btn-v { background: #166534; border-bottom: 3px solid #14532d; }
        button:active { transform: translateY(2px); }

        .controls { margin-top: 10px; display: flex; gap: 5px; width: 95%; max-width: 440px; flex-wrap: wrap; }
        input { background: #0f172a; border: 1px solid var(--neon); color: white; padding: 8px; border-radius: 5px; flex: 1; font-size: 12px; min-width: 80px; }
    </style>
</head>
<body>

    <div class="scorecard" id="card">
        <div class="goal-box" id="goalBox">
            <span>الهدف: <b id="gVal">0</b></span>
            <span>الربح: <b id="pVal">0</b></span>
        </div>

        <div style="text-align: center; font-size: 11px; color: var(--neon); margin-bottom: 5px;">أقوى 4 توقعات (مرتبة حسب الثقة)</div>
        
        <div class="quad-predictions" id="quadBox">
            </div>

        <div style="text-align: center; font-size: 14px; color: #f87171;">الرهان المقترح: <b id="bt">10,000</b></div>

        <div class="history-bar" id="hBar"></div>

        <div class="heat-map">
            <div id="mFill" style="background: #ef4444; width: 50%;"></div>
            <div id="vFill" style="background: #22c55e; width: 50%;"></div>
        </div>
    </div>

    <div class="grid" id="btns"></div>

    <div class="controls">
        <input type="number" id="inB" placeholder="الرصيد">
        <input type="number" id="inG" placeholder="الهدف">
        <button onclick="set()" style="background: #10b981; padding: 8px; font-size: 12px; flex: 1;">تحديث</button>
        <button onclick="reset()" style="background: #475569; padding: 8px; font-size: 12px;">تصفير</button>
    </div>

    <script>
        const items = [
            {n: "بيتزا", t: "m"}, {n: "لحم", t: "m"}, {n: "دجاج", t: "m"}, {n: "مشويات", t: "m"}, {n: "هوت دوغ", t: "m"},
            {n: "سلطة", t: "v"}, {n: "خس", t: "v"}, {n: "جزر", t: "v"}, {n: "ذرة", t: "v"}, {n: "طماطم", t: "v"}
        ];

        let hist = JSON.parse(localStorage.getItem('h8')) || [];
        let bal = parseFloat(localStorage.getItem('b8')) || 0;
        let startB = parseFloat(localStorage.getItem('s8')) || bal;
        let goal = parseFloat(localStorage.getItem('g8')) || 50000;

        function update() {
            document.getElementById('gVal').innerText = goal.toLocaleString();
            let p = bal - startB;
            document.getElementById('pVal').innerText = (p>=0?"+":"")+Math.floor(p).toLocaleString();
            document.getElementById('pVal').style.color = p>=0?"#22c55e":"#ef4444";
            
            if(p >= goal && goal > 0) document.getElementById('goalBox').classList.add('goal-achieved');
            else document.getElementById('goalBox').classList.remove('goal-achieved');

            document.getElementById('bt').innerText = Math.max(Math.floor(bal * 0.01), 10000).toLocaleString();

            const bar = document.getElementById('hBar');
            bar.innerHTML = hist.length ? hist.slice().reverse().map(i => `<span class="h-item">${i}</span>`).join('') : "انتظار...";

            let mC = hist.filter(x => items.find(z => z.n === x).t === 'm').length;
            document.getElementById('mFill').style.width = (hist.length ? (mC/hist.length)*100 : 50) + "%";
            document.getElementById('vFill').style.width = (hist.length ? ((hist.length-mC)/hist.length)*100 : 50) + "%";

            calculateQuad();

            localStorage.setItem('h8', JSON.stringify(hist));
            localStorage.setItem('b8', bal);
            localStorage.setItem('s8', startB);
            localStorage.setItem('g8', goal);
        }

        function calculateQuad() {
            let scores = items.map(it => {
                let count = hist.filter(h => h === it.n).length;
                let lastIdx = hist.lastIndexOf(it.n);
                let gap = lastIdx === -1 ? 25 : (hist.length - 1 - lastIdx);
                
                // الوزن الذكي: فجوة الغياب + ندرة الظهور
                let weight = (gap * 4) + ((hist.length - count) * 2);
                
                // إضافة لمسة عشوائية لكسر الجمود في البداية
                weight += Math.random() * 2;

                return { name: it.n, score: weight };
            });

            // ترتيب حسب الأعلى "استحقاقاً" للظهور
            scores.sort((a, b) => b.score - a.score);

            let quadBox = document.getElementById('quadBox');
            quadBox.innerHTML = "";
            
            // عرض أفضل 4
            for(let i=0; i<4; i++) {
                let rankText = ["الأول (قوي)", "الثاني", "الثالث", "الرابع"];
                quadBox.innerHTML += `
                    <div class="pred-item" style="${i===0?'border-color:#fbbf24; background:rgba(251,191,36,0.05)':''}">
                        <span class="rank">${rankText[i]}</span>
                        <span class="name">${scores[i].name}</span>
                    </div>
                `;
            }
        }

        function set() {
            let b = document.getElementById('inB').value;
            let g = document.getElementById('inG').value;
            if(b) { bal = parseFloat(b); startB = bal; }
            if(g) goal = parseFloat(g);
            update();
        }

        function reset() { if(confirm("تصفير؟")) { hist=[]; startB=bal; update(); } }

        const grid = document.getElementById('btns');
        items.forEach(it => {
            let b = document.createElement('button');
            b.innerText = it.n;
            b.className = it.t === "m" ? "btn-m" : "btn-v";
            b.onclick = () => { hist.push(it.n); if(hist.length > 25) hist.shift(); update(); };
            grid.appendChild(b);
        });

        update();
    </script>
</body>
</html>
