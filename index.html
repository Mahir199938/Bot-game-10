<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوت 10K - شريط النتائج</title>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; }
        /* السكور كارد الموحد في صندوق واحد */
        .scorecard { background: #1e293b; border: 2px solid #38bdf8; border-radius: 12px; padding: 15px; width: 95%; max-width: 380px; margin-top: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .stats-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 15px; }
        .prediction-box { text-align: center; border-top: 1px solid #334155; padding-top: 8px; }
        .prediction-text { color: #fbbf24; font-size: 26px; font-weight: bold; display: block; }
        .bet-alert { color: #f87171; font-weight: bold; font-size: 18px; }
        
        /* شريط العناصر المختارة */
        .history-bar { background: #0f172a; border-radius: 8px; padding: 5px; margin-top: 10px; font-size: 12px; color: #94a3b8; white-space: nowrap; overflow-x: auto; display: flex; gap: 8px; border: 1px solid #334155; }
        .history-item { background: #334155; padding: 2px 8px; border-radius: 4px; border: 1px solid #475569; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 95%; max-width: 380px; margin-top: 15px; }
        button { background: #334155; color: white; border: 1px solid #475569; padding: 15px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:active { background: #38bdf8; transform: scale(0.95); }
        
        .update-area { margin-top: 15px; background: #1e293b; padding: 10px; border-radius: 10px; width: 95%; max-width: 380px; display: flex; gap: 10px; }
        input { padding: 8px; border-radius: 5px; border: 1px solid #38bdf8; background: #0f172a; color: white; flex-grow: 1; }
    </style>
</head>
<body>

    <div class="scorecard">
        <div class="stats-row">
            <span>الرصيد: <b id="balance">412,790</b></span>
            <span>الرهان: <b id="bet" class="bet-alert">10,000</b></span>
        </div>
        
        <div class="prediction-box">
            <span>التوقع القادم: <span id="predict" class="prediction-text">---</span></span>
        </div>

        <div style="font-size: 11px; color: #38bdf8; margin-top: 10px;">آخر النتائج (سجل):</div>
        <div class="history-bar" id="historyBar">
            <span style="color: #475569;">لا توجد بيانات بعد...</span>
        </div>
    </div>

    <div class="grid" id="buttons"></div>

    <div class="update-area">
        <input type="number" id="newBalance" placeholder="الرصيد الجديد">
        <button onclick="updateBalance()" style="padding: 5px 15px; background: #10b981; font-size: 13px; border: none;">تحديث</button>
        <button onclick="clearHistory()" style="padding: 5px; background: #ef4444; font-size: 11px; border: none;">مسح السجل</button>
    </div>

    <script>
        let items = ["طماطم", "ذرة", "جزر", "خس", "هوت دوغ", "مشويات", "دجاج", "لحم"];
        let history = JSON.parse(localStorage.getItem('gameHistory10k')) || [];
        let balance = localStorage.getItem('gameBalance10k') || 412790;
        const MIN_BET = 10000;

        function updateUI() {
            // تحديث الأرقام
            document.getElementById('balance').innerText = Number(balance).toLocaleString();
            let calcBet = Math.floor(balance * 0.01);
            document.getElementById('bet').innerText = Math.max(calcBet, MIN_BET).toLocaleString();
            
            // حساب التوقع
            let counts = {};
            items.forEach(i => counts[i] = history.filter(h => h === i).length);
            document.getElementById('predict').innerText = items.reduce((a, b) => (counts[a] || 0) <= (counts[b] || 0) ? a : b);
            
            // تحديث شريط العناصر (History Bar)
            const bar = document.getElementById('historyBar');
            if (history.length > 0) {
                bar.innerHTML = history.slice().reverse().map(item => `<span class="history-item">${item}</span>`).join('');
            } else {
                bar.innerHTML = '<span style="color: #475569;">لا توجد بيانات بعد...</span>';
            }
            
            localStorage.setItem('gameHistory10k', JSON.stringify(history));
            localStorage.setItem('gameBalance10k', balance);
        }

        function updateBalance() {
            let val = document.getElementById('newBalance').value;
            if(val) { balance = val; updateUI(); document.getElementById('newBalance').value = ""; }
        }

        function clearHistory() {
            if(confirm("هل تريد مسح سجل النتائج؟")) {
                history = [];
                updateUI();
            }
        }

        const btnContainer = document.getElementById('buttons');
        items.forEach(item => {
            let btn = document.createElement('button');
            btn.innerText = item;
            btn.onclick = () => { 
                history.push(item); 
                if(history.length > 20) history.shift(); 
                updateUI(); 
            };
            btnContainer.appendChild(btn);
        });
        updateUI();
    </script>
</body>
</html>
