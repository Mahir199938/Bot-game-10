<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Party Hunter V23</title>
    <style>
        :root { --neon: #f472b6; --bg: #020617; --card: #1e1b4b; --gold: #fbbf24; --success: #4ade80; }
        body { font-family: sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .scorecard { background: var(--card); border: 2px solid var(--neon); border-radius: 12px; padding: 10px; width: 95%; max-width: 420px; box-shadow: 0 0 15px rgba(244,114,182,0.2); }
        
        /* شاشة جمع البيانات */
        .init-box { border: 1px dashed var(--gold); padding: 15px; border-radius: 10px; text-align: center; color: var(--gold); margin-bottom: 10px; }
        
        .pred-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin: 10px 0; }
        .pred-card { background: rgba(0,0,0,0.5); border: 1px solid #312e81; padding: 12px; border-radius: 10px; text-align: center; }
        .p-name { font-size: 18px; font-weight: bold; color: #f472b6; }
        .p-chance { font-size: 11px; color: var(--success); }

        .bet-info { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; border: 1px solid #334155; }
        
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 95%; max-width: 420px; margin-top: 20px; }
        button { padding: 18px 5px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; color: white; transition: 0.1s; }
        .btn-f { background: #312e81; border-bottom: 4px solid #1e1b4b; }
        .btn-f:active { transform: translateY(3px); border-bottom: none; }
        .btn-j { background: linear-gradient(45deg, #b45309, #d97706); grid-column: span 3; font-size: 18px; margin-top: 5px; }
        
        .history { display: flex; gap: 5px; overflow-x: auto; padding: 10px; width: 95%; max-width: 420px; margin-top: 10px; background: #000; border-radius: 5px; }
        .h-tag { font-size: 9px; padding: 3px 8px; background: #4338ca; border-radius: 4px; white-space: nowrap; }
    </style>
</head>
<body>

    <div class="scorecard" id="main">
        </div>

    <div class="history" id="hBar"></div>
    <div class="btn-grid" id="btns"></div>

    <script>
        const fruits = [
            {n: "كرز", x: 40}, {n: "بطيخ", x: 20}, {n: "موز", x: 10}, 
            {n: "فراولة", x: 10}, {n: "ليمون", x: 5}, {n: "توت", x: 5}, 
            {n: "كيوي", x: 5}, {n: "عنب", x: 5}
        ];
        
        let hist = JSON.parse(localStorage.getItem('v23_h')) || [];
        let riskMode = false;

        function update() {
            const main = document.getElementById('main');
            const hBar = document.getElementById('hBar');
            hBar.innerHTML = hist.slice().reverse().map(i => `<span class="h-tag">${i}</span>`).join('');

            if (hist.length < 10) {
                main.innerHTML = `
                    <div class="init-box">
                        <b style="font-size:18px;">نظام Fruit Party V23</b><br>
                        أدخل 10 نتائج لبدء تحليل الدورة...
                        <div style="font-size:24px; margin-top:10px;">${hist.length} / 10</div>
                    </div>
                `;
            } else {
                analyze();
            }
            localStorage.setItem('v23_h', JSON.stringify(hist));
        }

        function analyze() {
            const main = document.getElementById('main');
            
            let scores = fruits.map(f => {
                let last = hist.lastIndexOf(f.n);
                let gap = last === -1 ? 25 : hist.length - 1 - last;
                
                // خوارزمية الصيد: الفواكه التي تأخرت لكن ضمن حدود المعقول
                let s = gap * 15;
                if (f.x >= 20 && (gap < 12 || gap > 30)) s = -100; // تجنب التعليق في الكرز
                if (f.n === hist[hist.length-1]) s = -500; // لا تكرر فوراً

                return { n: f.n, s: s, x: f.x, g: gap };
            }).sort((a,b) => b.s - a.s);

            let top4 = scores.slice(0, 4);

            main.innerHTML = `
                <div style="text-align:center; font-size:12px; color:var(--gold); margin-bottom:8px;">🎯 الدورة الحالية: مستقرة</div>
                <div class="pred-grid">
                    ${top4.map(p => `
                        <div class="pred-card">
                            <div class="p-name">${p.n}</div>
                            <div class="p-chance">${p.x}x (غائب ${p.g})</div>
                        </div>
                    `).join('')}
                </div>
                <div class="bet-info">
                    <span>الرهان الموصى به: <b style="color:var(--gold)">10,000</b></span>
                    <span style="color:var(--success)">فرصة الربح: عالية</span>
                </div>
            `;
        }

        const bDiv = document.getElementById('btns');
        fruits.forEach(f => {
            let b = document.createElement('button');
            b.innerText = f.n; b.className = "btn-f";
            b.onclick = () => { hist.push(f.n); if(hist.length>40) hist.shift(); update(); };
            bDiv.appendChild(b);
        });

        let jb = document.createElement('button');
        jb.innerText = "🎰 JACKPOT"; jb.className = "btn-j";
        jb.onclick = () => { hist.push("جاكبوت"); update(); };
        bDiv.appendChild(jb);

        function resetAll() { if(confirm("تصفير الجلسة؟")) { localStorage.clear(); hist=[]; update(); } }

        update();
    </script>
    <button onclick="resetAll()" style="background:none; color:#475569; font-size:10px; margin-top:15px; text-decoration:underline;">إعادة تعيين</button>
</body>
</html>
