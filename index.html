<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوت الاستعادة V10 - Smart Recovery</title>
    <style>
        :root { --neon: #38bdf8; --bg: #020617; --card: #1e293b; --gold: #fbbf24; --danger: #ef4444; }
        body { font-family: sans-serif; background-color: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        
        .scorecard { background: var(--card); border: 2px solid var(--neon); border-radius: 12px; padding: 12px; width: 95%; max-width: 440px; box-shadow: 0 0 25px rgba(56,189,248,0.2); }
        
        /* رادار الجاكبوت */
        .jackpot-radar { background: rgba(251, 191, 36, 0.1); border: 2px double var(--gold); border-radius: 10px; padding: 8px; margin-bottom: 10px; text-align: center; }
        .jackpot-val { font-size: 26px; font-weight: bold; color: var(--gold); display: block; }

        /* التوقعات مع النجوم */
        .quad-predictions { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin: 10px 0; }
        .pred-item { text-align: center; padding: 10px; border-radius: 8px; background: rgba(0,0,0,0.3); border: 1px solid #334155; position: relative; }
        .stars { color: var(--gold); font-size: 10px; display: block; margin-top: 4px; }
        .name { font-size: 17px; font-weight: bold; color: var(--neon); }

        /* نظام التعويض */
        .recovery-zone { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); border-radius: 8px; padding: 8px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        .history-bar { background: #0f172a; border-radius: 6px; padding: 8px; margin: 10px 0; display: flex; gap: 5px; overflow-x: auto; border: 1px solid #334155; min-height: 25px; }
        .h-item { font-size: 10px; padding: 2px 8px; background: #334155; border-radius: 4px; white-space: nowrap; border-left: 2px solid var(--neon); }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; width: 95%; max-width: 440px; margin-top: 10px; }
        button { color: white; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-m { background: #991b1b; border-bottom: 3px solid #7f1d1d; }
        .btn-v { background: #166534; border-bottom: 3px solid #14532d; }
        .btn-lose { background: var(--danger); padding: 8px 15px; font-size: 12px; }

        .controls { margin-top: 15px; display: flex; gap: 5px; width: 95%; max-width: 440px; }
        input { background: #0f172a; border: 1px solid var(--neon); color: white; padding: 8px; border-radius: 5px; flex: 1; font-size: 12px; }
    </style>
</head>
<body>

    <div class="scorecard">
        <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 8px;">
            <span>الرصيد: <b id="bal" style="color: #4caf50;">0</b></span>
            <span>الربح: <b id="prof">0</b></span>
        </div>

        <div class="jackpot-radar">
            <span style="font-size: 10px; color: var(--gold);">⭐ رادار الجاكبوت (بيتزا/سلطة)</span>
            <span id="jackPredict" class="jackpot-val">---</span>
            <small id="jackWarn" style="color:red; display:none; font-size:9px;">⚠️ تأخر جداً! استعد</small>
        </div>

        <div class="quad-predictions" id="quadBox"></div>

        <div class="recovery-zone">
            <div style="font-size: 14px; color: var(--gold);">الرهان: <b id="bt">10,000</b></div>
            <button class="btn-lose" onclick="triggerLoss()">❌ لم يصب (تعويض)</button>
        </div>

        <div class="history-bar" id="hBar"></div>
    </div>

    <div class="grid" id="btns"></div>

    <div class="controls">
        <input type="number" id="inB" placeholder="تحديث الرصيد">
        <button onclick="set()" style="background: #10b981; padding: 8px; font-size: 12px; flex: 1;">تحديث</button>
        <button onclick="reset()" style="background: #475569; padding: 8px; font-size: 12px;">تصفير</button>
    </div>

    <script>
        const regular = [
            {n: "لحم", t: "m"}, {n: "دجاج", t: "m"}, {n: "مشويات", t: "m"}, {n: "هوت دوغ", t: "m"},
            {n: "خس", t: "v"}, {n: "جزر", t: "v"}, {n: "ذرة", t: "v"}, {n: "طماطم", t: "v"}
        ];
        const jacks = [{n: "بيتزا", t: "m"}, {n: "سلطة", t: "v"}];
        const all = [...regular, ...jacks];

        let hist = JSON.parse(localStorage.getItem('h10')) || [];
        let bal = parseFloat(localStorage.getItem('b10')) || 0;
        let startB = parseFloat(localStorage.getItem('s10')) || bal;
        let multiply = 1; // لزوم التعويض

        function update() {
            document.getElementById('bal').innerText = Math.floor(bal).toLocaleString();
            let p = bal - startB;
            document.getElementById('prof').innerText = (p>=0?"+":"")+Math.floor(p).toLocaleString();
            document.getElementById('prof').style.color = p>=0?"#22c55e":"#ef4444";
            
            // حساب الرهان مع معامل التعويض
            let baseBet = Math.max(Math.floor(bal * 0.01), 10000);
            document.getElementById('bt').innerText = (baseBet * multiply).toLocaleString();

            const bar = document.getElementById('hBar');
            bar.innerHTML = hist.length ? hist.slice().reverse().map(i => `<span class="h-item">${i}</span>`).join('') : "انتظار...";

            calculateV10();
            localStorage.setItem('h10', JSON.stringify(hist));
            localStorage.setItem('b10', bal);
            localStorage.setItem('s10', startB);
        }

        function calculateV10() {
            // 1. الجاكبوت
            let jScores = jacks.map(j => {
                let last = hist.lastIndexOf(j.n);
                return { n: j.n, g: last===-1 ? 30 : hist.length-1-last };
            }).sort((a,b)=>b.g-a.g);
            document.getElementById('jackPredict').innerText = jScores[0].n;
            document.getElementById('jackWarn').style.display = jScores[0].g > 14 ? "block" : "none";

            // 2. التوقعات الأربعة مع النجوم
            let rScores = regular.map(it => {
                let count = hist.filter(h => h === it.n).length;
                let last = hist.lastIndexOf(it.n);
                let gap = last===-1 ? 25 : hist.length-1-last;
                let weight = (gap * 6) + ((hist.length - count) * 4);
                if(hist.slice(-1).includes(it.n)) weight -= 60; // منع التكرار المباشر
                return { n: it.n, s: weight, gap: gap };
            }).sort((a,b)=>b.s-a.s);

            let qBox = document.getElementById('quadBox');
            qBox.innerHTML = rScores.slice(0, 4).map((s, i) => {
                let stars = s.gap > 10 ? "⭐⭐⭐" : (s.gap > 5 ? "⭐⭐" : "⭐");
                return `<div class="pred-item"><span class="name">${s.n}</span><span class="stars">${stars}</span></div>`;
            }).join('');
        }

        function triggerLoss() {
            multiply *= 2.2; // مضاعفة التعويض (مارتنجيل محسن)
            if(multiply > 10) multiply = 1; // حماية من تصفير الرصيد
            update();
        }

        function set() {
            let b = document.getElementById('inB').value;
            if(b) { bal = parseFloat(b); startB = bal; multiply = 1; }
            update();
        }

        function reset() { if(confirm("تصفير؟")) { hist=[]; multiply=1; update(); } }

        const grid = document.getElementById('btns');
        all.forEach(it => {
            let b = document.createElement('button');
            b.innerText = it.n;
            b.className = it.t === "m" ? "btn-m" : "btn-v";
            if(it.n==="بيتزا" || it.n==="سلطة") b.style.border = "2px solid var(--gold)";
            b.onclick = () => { 
                hist.push(it.n); 
                if(hist.length > 30) hist.shift();
                multiply = 1; // تصغير الرهان عند الفوز
                update(); 
            };
            grid.appendChild(b);
        });
        update();
    </script>
</body>
</html>
